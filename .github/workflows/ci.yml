name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mutating_live_tests:
        description: Run live tests that mutate the Niconico test account
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  changes:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    outputs:
      live: ${{ steps.filter.outputs.live }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Detect live test changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          changed_files="$(mktemp)"
          case "$GITHUB_EVENT_NAME" in
            workflow_dispatch)
              echo "live=true" >> "$GITHUB_OUTPUT"
              echo "workflow_dispatch always runs live tests." >> "$GITHUB_STEP_SUMMARY"
              exit 0
              ;;
            pull_request)
              base_ref="$(jq -r '.pull_request.base.ref' "$GITHUB_EVENT_PATH")"
              git fetch --no-tags --prune origin "$base_ref"
              git diff --name-only "origin/$base_ref"...HEAD > "$changed_files"
              ;;
            push)
              before_sha="$(jq -r '.before // ""' "$GITHUB_EVENT_PATH")"
              if [[ -z "$before_sha" || "$before_sha" =~ ^0+$ ]]; then
                git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" > "$changed_files"
              else
                git diff --name-only "$before_sha" "$GITHUB_SHA" > "$changed_files"
              fi
              ;;
            *)
              : > "$changed_files"
              ;;
          esac

          live=false
          while IFS= read -r file; do
            case "$file" in
              niconico/*|tests/integration/*|pyproject.toml|uv.lock|.github/workflows/ci.yml)
                live=true
                break
                ;;
            esac
          done < "$changed_files"

          echo "live=$live" >> "$GITHUB_OUTPUT"
          {
            echo "### Changed files"
            sed 's/^/- /' "$changed_files"
            echo
            echo "live=$live"
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.26"
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Run tests
        run: uv run pytest

  quality:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.26"
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Ruff
        run: uv run ruff check .
      - name: Pyright
        run: uv run pyright
      - name: Build
        run: uv build

  live:
    needs: changes
    if: github.actor != 'dependabot[bot]' && needs.changes.outputs.live == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: live-${{ github.repository }}
      cancel-in-progress: false
    env:
      NICONICO_MUTATION_COOLDOWN_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.mutating_live_tests && '10' || '0' }}
      NICONICO_MUTATION_START_COOLDOWN_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.mutating_live_tests && '300' || '0' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.26"
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Wait before live mutation tests
        if: env.NICONICO_MUTATION_START_COOLDOWN_SECONDS != '0'
        run: sleep "$NICONICO_MUTATION_START_COOLDOWN_SECONDS"
      - name: Run live tests
        run: uv run pytest tests/integration -m live
        env:
          NICONICO_LIVE_TESTS: "1"
          NICONICO_MUTATING_LIVE_TESTS: ${{ github.event_name == 'workflow_dispatch' && inputs.mutating_live_tests && '1' || '0' }}
          NICONICO_TEST_EMAIL: ${{ secrets.NICONICO_TEST_EMAIL }}
          NICONICO_TEST_PASSWORD: ${{ secrets.NICONICO_TEST_PASSWORD }}
          NICONICO_USER_SESSION: ${{ secrets.NICONICO_USER_SESSION }}
