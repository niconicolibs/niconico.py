name: Release

on:
  push:
    branches-ignore:
      - '**'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Branch Tag
        id: branch_tag
        run: echo "tag=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.10'
      - name: Install Poetry
        run: python -m pip install poetry==1.8.3
      - name: Build Poetry
        run: poetry build
      - name: Create Release
        run: gh release create "${{ steps.branch_tag.outputs.tag }}" dist/* --title "${{ steps.branch_tag.outputs.tag }}" --notes "Please enter the content of the release here" --prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
